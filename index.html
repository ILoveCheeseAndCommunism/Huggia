<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huggia | Art & Soul Collective</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #FDFBF7;        
            --primary-text: #2D2926;    /* 稍微加深顏色，讓文字更有質感 */
            --accent-color: #8C7E6D;    
            --button-bg: #FFFFFF;       
            --button-border: #E0D9CE;   
            --hover-bg: #F9F7F2;        
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#E8E2D6 0.7px, transparent 0.7px);
            background-size: 24px 24px;
            color: var(--primary-text);
            font-family: 'PingFang TC', 'Noto Sans TC', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 45px 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        header { margin-bottom: 45px; }

        .logo-container {
            width: 72px; /* 再次微調尺寸 */
            height: 72px;
            margin: 0 auto 28px auto;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.08));
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        h1 {
            font-size: 2.1rem;
            font-weight: 400; /* 稍微加深字重 */
            letter-spacing: 0.55rem;
            margin-bottom: 8px; /* 縮小與線條的間距 */
            text-transform: uppercase;
        }

        .divider {
            width: 32px;
            height: 1.5px;
            background-color: var(--accent-color);
            margin: 18px auto; /* 調整上下間距 */
            opacity: 0.35;
        }

        .subtitle {
            font-size: 0.95rem;
            line-height: 1.7;
            letter-spacing: 0.06rem;
            color: var(--accent-color);
            font-weight: 300;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 40px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--button-bg);
            border: 1px solid var(--button-border);
            border-radius: 14px;
            padding: 17px 20px;
            text-decoration: none;
            color: var(--primary-text);
            font-size: 1rem;
            letter-spacing: 0.04rem;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 4px 15px rgba(61, 56, 52, 0.04);
        }

        .link-btn:hover {
            transform: translateY(-2px);
            background-color: var(--hover-bg);
            border-color: var(--accent-color);
            box-shadow: 0 6px 20px rgba(61, 56, 52, 0.07);
        }

        .link-btn i, .link-btn .emoji-icon {
            position: absolute;
            left: 20px;
            font-size: 1.15rem;
            color: var(--accent-color);
        }

        footer {
            margin-top: 65px;
            font-size: 0.75rem;
            color: var(--accent-color);
            letter-spacing: 0.08rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-container">
                <img src="https://res.cloudinary.com/dhzabt1xr/image/upload/f_auto,q_auto/v1778185374/final_transparent_under1mb_mj2z57.png" alt="Huggia Logo">
            </div>
            <h1>Huggia</h1>
            <div class="divider"></div>
            <div class="subtitle">
                Art & Soul Collective<br>
                Promoting Soulful Essence
            </div>
        </header>

        <nav class="links-wrapper">
            <a href="https://www.instagram.com/huggia.bcn?igsh=MmU5cGNzNGF3dGg=" class="link-btn" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>

            <a href="https://huggia.vercel.app/postcards/dulan-love" class="link-btn" target="_blank">
                <span class="emoji-icon">✒️</span>
                <span>Postcard</span>
            </a>
        </nav>

        <footer>
            &copy; 2026 HUGGIA. BCN
        </footer>
    </div>

</body>
</html>
