<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheese2Share | Huggia</title>
    <style>
        /* 基礎背景設定，防止影片載入前出現突兀的純白或純黑 */
        body {
            margin: 0;
            padding: 0;
            background-color: #F4F1EA; /* 匹配您品牌的手揉紙色調 */
            font-family: serif;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 1200px; /* 根據您的排版需求調整 */
            margin: 0 auto;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            /* 關鍵：讓預載圖與影片完美填滿容器 */
            object-fit: cover;
            /* 加入淡淡的淡入效果，載入完成時更優雅 */
            transition: opacity 1s ease;
        }

        /* 讓文字在影片上方也能清晰閱讀的簡單遮罩（選用） */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.05); 
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- 
          屬性說明：
          1. autoplay: 嘗試自動播放
          2. muted: 靜音（這是行動裝置與 Chrome 自動播放的必要條件）
          3. loop: 循環播放
          4. playsinline: 讓 iPhone 使用者不會自動跳出全螢幕播放
          5. poster: 在影片載入前顯示的靜態圖（請確保路徑正確）
        -->
        <video 
            id="main-video"
            autoplay 
            muted 
            loop 
            playsinline 
            poster="images/video-first-frame.jpg"> 
            <source src="your-video-file.mp4" type="video/mp4">
            您的瀏覽器不支援影片播放，請升級瀏覽器。
        </video>
        <div class="video-overlay"></div>
    </div>

    <script>
        // 額外的保險：強制觸發播放（應對低耗電模式或特殊瀏覽器限制）
        window.addEventListener('load', function() {
            var video = document.getElementById('main-video');
            
            // 監測影片是否成功播放
            var playPromise = video.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // 播放成功
                    console.log("Video is playing automatically.");
                }).catch(error => {
                    // 自動播放被阻擋，通常是因為未靜音或使用者設定
                    console.log("Autoplay was prevented. Users may need to click to play.");
                    // 這裡可以加入一個「點擊播放」的提示圖示
                });
            }
        });
    </script>
</body>
</html>
